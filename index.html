<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spin Game</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://sad.adsgram.ai/js/adsgram.min.js"></script>
</head>
<body>
    <div class="game-container">
        <h1>স্পিন করুন এবং জিতুন!</h1>
        <div class="stats">
            <p>আপনার কয়েন: <span id="coins">5</span></p>
            <p>বাকি স্পিন: <span id="spins">3</span></p>
        </div>
        
        <button id="spin-btn">স্পিন করুন</button>
        <button id="ad-btn">ভিডিও দেখুন (+1 স্পিন)</button>
    </div>
    <script src="script.js"></script>
</body>
</html>
